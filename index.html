<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dense White Gradient Sound Dots</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      /* Changed CSS background to white so the edges match */
      background-color: #FFFFFF; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <script>
    let dots = [];
    let synth;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      
      colorMode(HSB, 360, 100, 100, 255); 
      
      synth = new p5.PolySynth();
      synth.setADSR(0.05, 0.1, 0.2, 0.5); 

      // Much tighter grid
      let spacing = 12;
      
      for (let x = spacing; x < width; x += spacing) {
        for (let y = spacing; y < height; y += spacing) {
          
          let h = map(x, 0, width, 0, 360); 
          let b = map(y, 0, height, 100, 50); 
          
          let dotColor = color(h, 85, b); 
          
          dots.push(new Dot(x, y, dotColor));
        }
      }
    }

    function draw() {
      // Pitch white canvas (Hue: 0, Saturation: 0, Brightness: 100)
      background(0, 0, 100); 

      for (let dot of dots) {
        dot.checkHover(mouseX, mouseY);
        dot.update();
        dot.display();
      }
    }

    class Dot {
      constructor(x, y, c) {
        this.x = x;
        this.y = y;
        this.baseRadius = 2; // Shrunk slightly for the denser grid
        this.glowRadius = 14;  
        this.currentRadius = this.baseRadius;
        this.targetColor = c;  
        this.isGlowing = false;
        this.glowIntensity = 0;
        this.cooldown = 0;
      }

      checkHover(mx, my) {
        let d = dist(this.x, this.y, mx, my);
        
        // Exact pinpoint hover tracking
        if (d < 8 && this.cooldown === 0) {
          this.isGlowing = true;
          this.cooldown = 45; 

          let midiNote = map(this.y, 0, height, 85, 45); 
          synth.play(midiToFreq(midiNote), 0.1, 0, 0.2); 
        }
      }

      update() {
        if (this.isGlowing) {
          this.glowIntensity = lerp(this.glowIntensity, 255, 0.2);
          this.currentRadius = lerp(this.currentRadius, this.glowRadius, 0.2);
        } else {
          this.glowIntensity = lerp(this.glowIntensity, 0, 0.05);
          this.currentRadius = lerp(this.currentRadius, this.baseRadius, 0.05);
        }

        if (this.cooldown > 0) {
          this.cooldown--;
          if (this.cooldown === 0) this.isGlowing = false;
        }
      }

      display() {
        noStroke();
        
        if (this.glowIntensity > 5) {
          let c = color(this.targetColor);
          c.setAlpha(this.glowIntensity * 0.4); 
          fill(c);
          ellipse(this.x, this.y, this.currentRadius * 2);
        }

        if (this.glowIntensity > 150) {
          fill(this.targetColor); 
        } else {
          fill(0); // Pure black resting dots contrast against the white canvas
        }
        
        ellipse(this.x, this.y, this.baseRadius * 2);
      }
    }

    function mousePressed() {
      userStartAudio(); 
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
