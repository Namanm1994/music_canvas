<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Gravity Grid Sound Dots</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      background-color: #FFFFFF; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <script>
    let dots = [];
    let synth;
    let lastNoteTime = 0; 

    function setup() {
      createCanvas(windowWidth, windowHeight);
      
      colorMode(HSB, 360, 100, 100, 255); 
      
      synth = new p5.PolySynth();
      synth.setADSR(0.05, 0.1, 0.1, 0.3); 

      let spacing = 12;
      
      for (let x = spacing; x < width; x += spacing) {
        for (let y = spacing; y < height; y += spacing) {
          let h = map(x, 0, width, 0, 360); 
          let b = map(y, 0, height, 100, 50); 
          let dotColor = color(h, 85, b); 
          
          dots.push(new Dot(x, y, dotColor));
        }
      }
    }

    function draw() {
      background(0, 0, 100); 

      for (let dot of dots) {
        dot.checkHover(mouseX, mouseY);
        dot.update();
        dot.display(mouseX, mouseY); // Pass mouse position to the display method
      }
    }

    class Dot {
      constructor(x, y, c) {
        this.x = x;
        this.y = y;
        this.baseRadius = 2; 
        this.glowRadius = 14;  
        this.currentRadius = this.baseRadius;
        this.targetColor = c;  
        this.isGlowing = false;
        this.glowIntensity = 0;
        this.cooldown = 0;
      }

      checkHover(mx, my) {
        // We calculate note triggers based on original un-warped physics coordinates 
        // to maintain pixel-perfect cursor accuracy.
        let d = dist(this.x, this.y, mx, my);
        
        if (d < 8 && this.cooldown === 0) {
          this.isGlowing = true;
          this.cooldown = 45; 

          if (millis() - lastNoteTime > 40) {
            let midiNote = map(this.y, 0, height, 85, 45); 
            synth.play(midiToFreq(midiNote), 0.05, 0, 0.15); 
            lastNoteTime = millis(); 
          }
        }
      }

      update() {
        if (this.isGlowing) {
          this.glowIntensity = lerp(this.glowIntensity, 255, 0.2);
          this.currentRadius = lerp(this.currentRadius, this.glowRadius, 0.2);
        } else {
          this.glowIntensity = lerp(this.glowIntensity, 0, 0.05);
          this.currentRadius = lerp(this.currentRadius, this.baseRadius, 0.05);
        }

        if (this.cooldown > 0) {
          this.cooldown--;
          if (this.cooldown === 0) this.isGlowing = false;
        }
      }

      display(mx, my) {
        noStroke();
        
        // --- GRAVITY WARP MATH ---
        let renderX = this.x;
        let renderY = this.y;
        let sizeModifier = 1.0;
        
        let d = dist(this.x, this.y, mx, my);
        let gravityRadius = 160; // How far away the "pull" of the cursor reaches
        
        if (d < gravityRadius) {
          // 1. Calculate the pull strength using a sine curve.
          // Pull is 0 at the cursor tip, peaks mid-way, and drops to 0 at the edge.
          let pullFactor = sin(map(d, 0, gravityRadius, 0, PI)) * 12; 
          
          // 2. Find the angle pointing from this dot straight to the mouse cursor
          let angle = atan2(my - this.y, mx - this.x);
          
          // 3. Shift the rendered coordinates along that angle vector
          renderX += cos(angle) * pullFactor;
          renderY += sin(angle) * pullFactor;
          
          // 4. Shrink the dot size linearly as it gets closer to the cursor tip 
          // to simulate it "sinking" deeper away from the camera lens.
          sizeModifier = map(d, 0, gravityRadius, 0.5, 1.0);
        }

        // Apply depth scaling to the visual radii
        let displayGlowRadius = this.currentRadius * sizeModifier;
        let displayBaseRadius = this.baseRadius * sizeModifier;

        // Draw the glowing aura at the warped coordinates
        if (this.glowIntensity > 5) {
          let c = color(this.targetColor);
          c.setAlpha(this.glowIntensity * 0.4); 
          fill(c);
          ellipse(renderX, renderY, displayGlowRadius * 2);
        }

        // Draw the black resting dot at the warped coordinates
        if (this.glowIntensity > 150) {
          fill(this.targetColor); 
        } else {
          fill(0); 
        }
        
        ellipse(renderX, renderY, displayBaseRadius * 2);
      }
    }

    function mousePressed() {
      userStartAudio(); 
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
